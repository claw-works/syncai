name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: syncai
            asset_name: syncai-linux-x86_64

          # Linux aarch64 (static musl) — native arm runner
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            binary: syncai
            asset_name: syncai-linux-aarch64

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: syncai
            asset_name: syncai-macos-x86_64

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: syncai
            asset_name: syncai-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name '*.sha256' | sort | while read f; do
            sha256sum "${f#./}" > "${f#./}.sha256"
          done
          ls -lh

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Try to pull the relevant section from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[?${TAG#v}\]?/,/^## /" CHANGELOG.md \
              | head -n -1 | tail -n +2 > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            artifacts/*/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
